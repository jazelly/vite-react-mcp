<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #070707;
        color: #f4f2ed;
        font-family: Inter, system-ui, sans-serif;
      }

      .composition {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #070707;
      }

      .camera {
        position: absolute;
        inset: 0;
        transform-origin: 50% 50%;
      }

      .shot {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
        object-fit: cover;
        opacity: 0;
      }

      #shot01 {
        opacity: 1;
      }

      .vignette {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(90deg, rgba(7, 7, 7, 0.2), rgba(7, 7, 7, 0) 18%, rgba(7, 7, 7, 0) 78%, rgba(7, 7, 7, 0.18)),
          linear-gradient(180deg, rgba(7, 7, 7, 0.22), rgba(7, 7, 7, 0) 16%, rgba(7, 7, 7, 0) 82%, rgba(7, 7, 7, 0.2));
      }

      .cursor {
        position: absolute;
        left: 0;
        top: 0;
        z-index: 20;
        width: 42px;
        height: 42px;
        transform-origin: 8px 8px;
        filter: drop-shadow(0 12px 18px rgba(0, 0, 0, 0.34));
      }

      .cursor svg {
        display: block;
        width: 42px;
        height: 42px;
      }

      .click-ring {
        position: absolute;
        z-index: 19;
        left: 0;
        top: 0;
        width: 44px;
        height: 44px;
        margin-left: -16px;
        margin-top: -16px;
        border: 3px solid #1d4ed8;
        border-radius: 999px;
        opacity: 0;
      }

      .step-pill {
        position: absolute;
        left: 72px;
        bottom: 60px;
        z-index: 18;
        display: flex;
        align-items: center;
        gap: 14px;
        min-height: 58px;
        padding: 0 18px;
        border: 1px solid rgba(244, 242, 237, 0.16);
        border-radius: 14px;
        background: rgba(7, 7, 7, 0.82);
        box-shadow: 0 22px 70px rgba(0, 0, 0, 0.38);
        backdrop-filter: blur(14px);
      }

      .step-index {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border-radius: 10px;
        color: #f4f2ed;
        background: #1d4ed8;
        font-size: 15px;
        font-weight: 850;
        font-variant-numeric: tabular-nums;
      }

      .step-copy {
        position: relative;
        width: 610px;
        min-height: 28px;
        color: #f4f2ed;
        font-size: 22px;
        font-weight: 820;
      }

      .step-copy span {
        position: absolute;
        inset: 0 auto auto 0;
        opacity: 0;
      }

      .step-copy span:first-child {
        opacity: 1;
      }

      .source-chip {
        position: absolute;
        right: 72px;
        top: 60px;
        z-index: 18;
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 44px;
        padding: 0 14px;
        border: 1px solid rgba(244, 242, 237, 0.14);
        border-radius: 999px;
        background: rgba(7, 7, 7, 0.78);
        color: #f4f2ed;
        font-size: 16px;
        font-weight: 760;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
      }

      .source-dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: #1d4ed8;
        box-shadow: 0 0 0 5px rgba(29, 78, 216, 0.2);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="24"
      data-width="1920"
      data-height="1080"
    >
      <div class="composition" data-layout-allow-overflow>
        <div class="camera" id="camera" data-layout-allow-overflow>
          <img id="shot01" class="shot" src="assets/01-workspace.png" alt="Real webpack issue tracking playground with toolkit launcher" />
          <img id="shot02" class="shot" src="assets/02-toolkit-open.png" alt="Real Agentic React toolkit opened on the webpack playground" />
          <img id="shot03" class="shot" src="assets/03-multiselect-active.png" alt="Real toolkit with multiselect active" />
          <img id="shot04" class="shot" src="assets/04-first-selection.png" alt="First real issue table element selected" />
          <img id="shot05" class="shot" src="assets/05-second-selection.png" alt="Second real issue table element selected" />
          <img id="shot06" class="shot" src="assets/06-third-selection.png" alt="Third real issue table element selected" />
          <img id="shot07" class="shot" src="assets/07-tune-1.png" alt="Real tuning modal for first selected issue element" />
          <img id="shot08" class="shot" src="assets/08-tune-2.png" alt="Real tuning modal for second selected issue element" />
          <img id="shot09" class="shot" src="assets/09-tune-3.png" alt="Real tuning modal for third selected issue element" />
          <img id="shot11" class="shot" src="assets/11-return-to-toolkit.png" alt="Real selected issue table elements before clicking Done" />
          <img id="shot10" class="shot" src="assets/10-done.png" alt="Real toolkit after Done copies selected contexts" />
        </div>
        <div class="vignette" data-layout-ignore></div>
        <div class="click-ring" id="click-ring"></div>
        <div class="cursor" id="cursor" data-layout-ignore>
          <svg viewBox="0 0 42 42" aria-hidden="true">
            <path d="M8 4 L33 25 L21 27 L16 38 L8 4 Z" fill="#f4f2ed" stroke="#070707" stroke-width="3" stroke-linejoin="round" />
          </svg>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      const showShot = (id, time) => {
        tl.to(id, { opacity: 1, duration: 0.26, ease: "sine.out" }, time);
      };

      const CURSOR_TIP_X = 8;
      const CURSOR_TIP_Y = 4;

      const moveCursor = (x, y, time, duration = 0.5) => {
        tl.to("#cursor", { x: x - CURSOR_TIP_X, y: y - CURSOR_TIP_Y, duration, ease: "power2.inOut" }, time);
      };

      const clickAt = (x, y, time) => {
        tl.to("#cursor", { scale: 0.86, duration: 0.08, ease: "power2.out", overwrite: "auto" }, time);
        tl.to("#cursor", { scale: 1, duration: 0.16, ease: "back.out(3)", overwrite: "auto" }, time + 0.1);
        tl.set("#click-ring", { x, y, scale: 0.4, opacity: 0 }, time);
        tl.to("#click-ring", { opacity: 0.78, scale: 1, duration: 0.15, ease: "power2.out", overwrite: "auto" }, time);
        tl.to("#click-ring", { opacity: 0, scale: 1.75, duration: 0.26, ease: "power2.out", overwrite: "auto" }, time + 0.18);
      };

      tl.set("#cursor", { x: 1848, y: 1024 }, 0);
      tl.from("#shot01", { opacity: 0, scale: 1.01, duration: 0.65, ease: "power2.out" }, 0.15);
      tl.from("#cursor", { x: 1918, y: 1058, opacity: 0, duration: 0.42, ease: "power3.out" }, 0.66);

      tl.to("#camera", { x: -330, y: -120, scale: 1.34, duration: 0.9, ease: "power3.inOut" }, 1.2);
      moveCursor(1858, 1036, 1.75, 0.55);
      clickAt(1858, 1036, 2.24);
      showShot("#shot02", 2.38);

      moveCursor(1754, 987, 3.18, 0.48);
      clickAt(1754, 987, 3.66);
      showShot("#shot03", 3.82);

      tl.to("#camera", { x: -70, y: -36, scale: 1.12, duration: 0.85, ease: "power3.inOut" }, 4.7);
      moveCursor(510, 388, 4.86, 0.78);
      clickAt(510, 388, 5.55);
      showShot("#shot04", 5.7);
      moveCursor(510, 438, 6.22, 0.48);
      clickAt(510, 438, 6.74);
      showShot("#shot05", 6.9);
      moveCursor(510, 489, 7.42, 0.48);
      clickAt(510, 489, 7.94);
      showShot("#shot06", 8.1);

      moveCursor(635, 360, 9.0, 0.54);
      clickAt(635, 360, 9.58);
      showShot("#shot07", 9.72);
      moveCursor(635, 418, 11.0, 0.5);
      clickAt(635, 418, 11.54);
      showShot("#shot08", 11.68);
      moveCursor(635, 476, 13.0, 0.5);
      clickAt(635, 476, 13.54);
      showShot("#shot09", 13.68);

      tl.to("#camera", { x: -330, y: -120, scale: 1.34, duration: 0.86, ease: "power3.inOut" }, 15.2);
      showShot("#shot11", 15.32);
      moveCursor(1704, 833, 15.52, 0.74);
      clickAt(1704, 833, 16.26);
      showShot("#shot10", 16.42);
      tl.to("#camera", { x: 0, y: 0, scale: 1, duration: 1.2, ease: "power3.inOut" }, 18.25);
      tl.to("#cursor", { x: 1840, y: 1020, opacity: 0, duration: 0.5, ease: "power2.in" }, 19.25);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
